name: Build Phantom Socket Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
       
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
       
      - name: Build Relay (Linux Static)
        working-directory: ./relay
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gs-oyen-r ./cmd/relay/main.go
       
      - name: Verify ELF Format
        run: |
          file ./relay/gs-oyen-r | grep "ELF 64-bit LSB executable"
          hexdump -C ./relay/gs-oyen-r | head -n 1 | grep "7f 45 4c 46"
       
      - name: Copy to bin/
        run: |
          cp ./relay/gs-oyen-r ./bin/gs-oyen-r
          cp ./relay/gs-oyen-r ./deploy/gs-oyen-r
       
      - name: Commit Binaries
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f bin/gs-oyen-r deploy/gs-oyen-r
          git diff --cached --quiet || git commit -m "ci: auto-build Linux relay v1.0.1-stable"
          git push origin main || true

  build-client:
    runs-on: ubuntu-latest
    needs: build-relay
    steps:
      - uses: actions/checkout@v4
       
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
       
      - name: Build Client (musl static)
        working-directory: ./client
        run: |
          make clean
          make ARCH=x86_64 prod
       
      - name: Verify ELF Format
        run: |
          file ./client/bin/gs-oyen-s-x86_64 | grep "ELF 64-bit LSB executable"
          hexdump -C ./client/bin/gs-oyen-s-x86_64 | head -n 1 | grep "7f 45 4c 46"
       
      - name: Copy to bin/
        run: cp ./client/bin/gs-oyen-s-x86_64 ./bin/gs-oyen-s-x86_64
       
      - name: Commit Binaries
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f bin/gs-oyen-s-x86_64
          git diff --cached --quiet || git commit -m "ci: auto-build Linux client v1.0.1-stable"
          git push origin main || true
